apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-onnx-multiworker
  namespace: proj20
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving-onnx-multiworker
  template:
    metadata:
      labels:
        app: serving-onnx-multiworker
    spec:
      containers:
      - name: serving-onnx-multiworker
        image: pranalithakkar/serving-onnx:latest
        command: ["uvicorn", "app_onnx:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "4"]
        ports:
        - containerPort: 8003
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: serving-onnx-multiworker-svc
  namespace: proj20
spec:
  selector:
    app: serving-onnx-multiworker
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
