apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-baseline
  namespace: proj20
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving-baseline
  template:
    metadata:
      labels:
        app: serving-baseline
    spec:
      containers:
      - name: serving-baseline
        image: pranalithakkar/serving-baseline:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: serving-baseline-svc
  namespace: proj20
spec:
  selector:
    app: serving-baseline
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
